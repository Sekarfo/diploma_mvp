name: diploma-recruitment

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: recruitment_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - recruitment_net

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: recruitment_backend
    # host.docker.internal resolves to the host machine on Docker Desktop (Windows / macOS).
    # On Linux add: extra_hosts: ["host.docker.internal:host-gateway"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-resumes_index}
      # Use the host machine's PostgreSQL (diploma database) so data
      # persists across container rebuilds and is shared with local dev.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-0000}@host.docker.internal:5432/${POSTGRES_DB:-diploma}
      DB_SCHEMA_AUTOCREATE: "false"
      AUTH_PASSWORD_PEPPER: ${AUTH_PASSWORD_PEPPER:-change_me_to_a_long_random_secret}
      AUTH_SESSION_TTL_MINUTES: ${AUTH_SESSION_TTL_MINUTES:-10080}
      CROSS_ENCODER_MODEL: ${CROSS_ENCODER_MODEL:-cross-encoder/ms-marco-MiniLM-L-12-v2}
      CROSS_ENCODER_MAX_LENGTH: ${CROSS_ENCODER_MAX_LENGTH:-512}
      CROSS_ENCODER_BATCH_SIZE: ${CROSS_ENCODER_BATCH_SIZE:-64}
      CROSS_ENCODER_CASCADE_ENABLED: ${CROSS_ENCODER_CASCADE_ENABLED:-true}
      CROSS_ENCODER_CASCADE_TOP_M: ${CROSS_ENCODER_CASCADE_TOP_M:-200}
      CROSS_ENCODER_CASCADE_DEFAULT_SCORE: ${CROSS_ENCODER_CASCADE_DEFAULT_SCORE:-0.0}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - recruitment_net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: recruitment_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - recruitment_net

volumes:
  es_data:

networks:
  recruitment_net:
    driver: bridge
